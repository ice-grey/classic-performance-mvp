        }

            box-shadow: 0 20px 50px -12px rgba(154, 132, 161, 0.1);
        }
        
        /* 전역적으로 날카로운 직각 적용 */
        * {
            border-radius: 0 !important;
        }

            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #FFFFFF;
        }
        ::-webkit-scrollbar-thumb {

        }
